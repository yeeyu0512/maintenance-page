<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>網站維修中</title>
  <style>
    body {
      background-color: #f0f0f0;
      color: #333;
      font-family: sans-serif;
      text-align: center;
      padding: 100px;
    }

    .message {
      font-size: 24px;
      margin-bottom: 20px;
    }

    /* 新增按鈕的樣式 */
    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      color: #fff;
      background-color: #007bff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body>
  <div class="message">🚧 網頁調整中 🚧</div>
  <p>目前網頁正在調整中，請稍後再訪。感謝您的耐心等候！</p>
  <p id="countdown">5 秒後將自動返回上一頁或跳轉到 Google 首頁…</p>
  
  <button id="redirectBtn" class="btn">立即跳轉</button>

  <script>
    let sec = 5;
    const countdown = document.getElementById("countdown");
    const redirectBtn = document.getElementById("redirectBtn");

    // 將跳轉邏輯寫成一個獨立的函數
    function executeRedirect() {
      if (document.referrer && window.history.length > 1) {
        window.history.back();
        
        // 【保險機制】：如果 history.back() 失效，0.5秒後強制導向 Google
        setTimeout(() => {
          window.location.href = "https://www.google.com/";
        }, 500);
      } else {
        window.location.href = "https://www.google.com/";
      }
    }

    // 設定倒數計時器
    const timer = setInterval(() => {
      sec--;
      countdown.textContent = `${sec} 秒後將自動返回上一頁或跳轉到 Google 首頁…`;
      
      if (sec <= 0) {
        clearInterval(timer);
        executeRedirect();
      }
    }, 1000);

    // 綁定按鈕點擊事件
    redirectBtn.addEventListener("click", () => {
      clearInterval(timer); // 點擊時先停止倒數計時，避免重複觸發
      countdown.textContent = "正在為您跳轉中…"; // 給予畫面回饋
      executeRedirect();    // 立即執行跳轉
    });
  </script>
</body>

</html>
